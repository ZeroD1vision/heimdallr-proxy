<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    /* Абсолютно черный OLED фон */
    .bg-oled {
      fill: #000000;
    }

    /* Базовая плавность для элементов */
    .part-h, .part-p {
      transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
      fill: #ffffff; /* Белый цвет логотипа для максимального контраста */
    }
    
    /* Эффект раздвигающихся половин при ховере на картинку */
    svg:hover .part-h {
      transform: translateX(-3px);
    }
    svg:hover .part-p {
      transform: translateX(4px);
    }
  </style>

